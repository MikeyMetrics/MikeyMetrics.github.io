<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaBoost AI - Premium Growth</title>
    <style>
        :root { --primary: #f09433; --secondary: #bc1888; --dark: #0a0a0a; --gold: #ffd700; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .card { width: 90%; max-width: 420px; background: #151515; border: 1px solid #333; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); text-align: center; }
        .logo { width: 60px; margin-bottom: 10px; }
        .step { display: none; } .active-step { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .service-btn { background: #222; border: 1px solid #444; padding: 15px; margin: 10px 0; width: 100%; border-radius: 10px; color: white; cursor: pointer; transition: 0.3s; }
        .service-btn:hover { border-color: var(--primary); background: #2a2a2a; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; }
        .next-btn { width: 100%; padding: 15px; background: linear-gradient(45deg, var(--primary), var(--secondary)); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        .bar-bg { width: 100%; background: #333; height: 10px; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .bar-fill { width: 0%; height: 100%; background: linear-gradient(to right, var(--primary), var(--gold)); transition: 0.3s; }
        /* Hidden Ads Style */
        .hidden-ads { position: absolute; left: -9999px; top: -9999px; width: 1px; height: 1px; opacity: 0; }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="logo">
        
        <div id="page1" class="step active-step">
            <h2>Select Service</h2>
            <p style="font-size:12px; color:#888;">Boost your profile instantly</p>
            <button class="service-btn" onclick="nextPage(2)">👥 1,000 Followers</button>
            <button class="service-btn" onclick="nextPage(2)">❤️ 5,000 Likes</button>
            <button class="service-btn" onclick="nextPage(2)">🎬 10,000 Views</button>
        </div>

        <div id="page2" class="step">
            <h2>Account Details</h2>
            <input type="text" id="username" placeholder="Enter Instagram Username...">
            <select style="width:100%; padding:12px; background:#111; color:white; border-radius:8px; border:1px solid #444;">
                <option>Server 1 (Fast)</option>
                <option>Server 2 (High Quality)</option>
                <option>Private Proxy Server</option>
            </select>
            <br><br>
            <button class="next-btn" onclick="startLoading()">CONTINUE 🚀</button>
        </div>

        <div id="page3" class="step">
            <h2 id="status-text">Processing...</h2>
            <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
            <p id="percent">0%</p>
            <div id="final-btn-div" style="display:none;">
                <div style="padding:15px; border:1px dashed var(--gold); border-radius:10px; background:rgba(255,215,0,0.05);">
                    <p style="font-size:12px;">Human Verification Required!</p>
                    <button class="next-btn" onclick="openAd()">GET VERIFICATION CODE</button>
                </div>
            </div>
        </div>
    </div>

    <div class="hidden-ads">
        <iframe src="https://www.profitablecpmratenetwork.com/f0m854878?key=d9da7b407878bc1783ba3c190a523c24"></iframe>
        <iframe src="https://www.profitablecpmratenetwork.com/f0m854878?key=d9da7b407878bc1783ba3c190a523c24"></iframe>
        <iframe src="https://www.profitablecpmratenetwork.com/f0m854878?key=d9da7b407878bc1783ba3c190a523c24"></iframe>
        <iframe src="https://www.profitablecpmratenetwork.com/f0m854878?key=d9da7b407878bc1783ba3c190a523c24"></iframe>
        <iframe src="https://www.profitablecpmratenetwork.com/f0m854878?key=d9da7b407878bc1783ba3c190a523c24"></iframe>
        <iframe src="https://www.profitablecpmratenetwork.com/f0m854878?key=d9da7b407878bc1783ba3c190a523c24"></iframe>
    </div>

    <script>
        function nextPage(num) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active-step'));
            document.getElementById('page' + num).classList.add('active-step');
        }

        function startLoading() {
            let u = document.getElementById('username').value;
            if(u.length < 3) { alert("Enter valid username!"); return; }
            nextPage(3);
            let p = 0;
            let int = setInterval(() => {
                p += Math.floor(Math.random() * 4) + 1;
                if(p > 100) p = 100;
                document.getElementById('bar').style.width = p + "%";
                document.getElementById('percent').innerText = p + "%";
                if(p == 30) document.getElementById('status-text').innerText = "Connecting to @" + u;
                if(p == 60) document.getElementById('status-text').innerText = "Injecting Packets...";
                if(p >= 100) {
                    clearInterval(int);
                    document.getElementById('status-text').innerText = "Ready!";
                    document.getElementById('final-btn-div').style.display = 'block';
                }
            }, 200);
        }

        function openAd() {
            // Asli Kamai Wala Click
            window.open('https://www.profitablecpmratenetwork.com/f0m854878?key=d9da7b407878bc1783ba3c190a523c24', '_blank');
            alert('Your Code: INSTA-2026-OK \n\nFollowers will be added in 15 mins!');
        }
    </script>
</body>
</html>
