<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikey Metrics | Fast SMM Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon-purp: #bc13fe; --neon-cyan: #00d2ff; --bg-dark: #05050a; }
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        
        .bg-animate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a103d, #05050a); z-index: -1; }

        .container { width: 90%; max-width: 450px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin: 20px 0; }

        .logo { font-family: 'Orbitron'; font-size: 2.5rem; text-align: center; color: #fff; text-shadow: 0 0 15px var(--neon-purp); margin-bottom: 5px; letter-spacing: 5px; }
        .tagline { text-align: center; font-size: 0.7rem; color: var(--neon-cyan); letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; }

        label { display: block; margin: 15px 0 8px; font-size: 0.75rem; color: #aaa; font-weight: 600; text-transform: uppercase; }
        input, select { width: 100%; padding: 15px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: white; outline: none; box-sizing: border-box; font-size: 1rem; transition: 0.3s; margin-bottom: 10px; }
        input:focus, select:focus { border-color: var(--neon-purp); box-shadow: 0 0 15px rgba(188, 19, 254, 0.2); }

        .bill-card { background: rgba(0, 255, 136, 0.05); border: 1px solid #00ff88; padding: 15px; border-radius: 20px; text-align: center; margin: 20px 0; }
        .bill-amt { font-size: 2.2rem; font-family: 'Orbitron'; color: #00ff88; text-shadow: 0 0 10px rgba(0, 255, 136, 0.3); }

        .btn-mikey { background: linear-gradient(90deg, var(--neon-purp), #7a00ff); border: none; color: white; padding: 20px; width: 100%; border-radius: 50px; font-family: 'Orbitron'; font-weight: 700; cursor: pointer; transition: 0.4s; letter-spacing: 2px; box-shadow: 0 10px 20px rgba(188, 19, 254, 0.3); font-size: 1rem; }
        .btn-mikey:hover { transform: translateY(-3px); box-shadow: 0 15px 30px var(--neon-purp); }
        
        .trust-badge { text-align: center; font-size: 0.65rem; color: #666; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="bg-animate"></div>

<div class="container">
    <div class="logo">MIKEY</div>
    <div class="tagline">Direct Social Growth</div>

    <label><i class="fa-solid fa-layer-group"></i> 1. Select Platform</label>
    <select id="platform" onchange="updateServices()">
        <option value="insta">Instagram Services</option>
        <option value="yt">YouTube Services</option>
        <option value="fb">Facebook Services</option>
    </select>

    <label><i class="fa-solid fa-bolt"></i> 2. Choose Service</label>
    <select id="service" onchange="calc()"></select>

    <label><i class="fa-solid fa-link"></i> 3. Paste Link</label>
    <input type="text" id="link" placeholder="https://www.instagram.com/reels/...">

    <label><i class="fa-solid fa-arrow-up-9-1"></i> 4. Quantity</label>
    <input type="number" id="qty" value="1000" oninput="calc()">

    <div class="bill-card">
        <span style="font-size:0.7rem; color:#00ff88; letter-spacing: 1px;">FINAL AMOUNT</span><br>
        <span class="bill-amt">₹<span id="total">0.00</span></span>
    </div>

    <button class="btn-mikey" onclick="placeOrder()">PLACE ORDER ✅</button>
    
    <div class="trust-badge">
        <i class="fa-solid fa-shield-halved"></i> 100% Safe & Secure | Non-Drop
    </div>
</div>

<script>
    const data = {
        insta: [
            {n: "Followers (Premium Non-Drop)", p: 45},
            {n: "Reel Views (Instant Viral)", p: 10},
            {n: "Likes (Real Accounts)", p: 15}
        ],
        yt: [
            {n: "YouTube Subscribers", p: 250},
            {n: "High Retention Views", p: 140}
        ],
        fb: [
            {n: "Page Followers/Likes", p: 60}
        ]
    };

    function updateServices() {
        const p = document.getElementById('platform').value;
        const s = document.getElementById('service');
        s.innerHTML = "";
        data[p].forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.p;
            opt.text = item.n;
            s.appendChild(opt);
        });
        calc();
    }

    function calc() {
        const rate = document.getElementById('service').value;
        const qty = document.getElementById('qty').value || 0;
        const total = (rate / 1000) * qty;
        document.getElementById('total').innerText = total.toFixed(2);
    }

    function placeOrder() {
        const srv = document.getElementById('service').options[document.getElementById('service').selectedIndex].text;
        const link = document.getElementById('target')?.value || document.getElementById('link').value;
        const qty = document.getElementById('qty').value;
        const total = document.getElementById('total').innerText;
        const phone = "919341344821"; 

        if(!link || qty < 10) return alert("Bhai, pehle link aur quantity check karo!");
        
        const msg = `*NEW ORDER - MIKEY METRICS*%0A` +
                    `--------------------------%0A` +
                    `🚀 *Service:* ${srv}%0A` +
                    `🔗 *Link:* ${link}%0A` +
                    `🔢 *Qty:* ${qty}%0A` +
                    `💰 *Price:* ₹${total}%0A` +
                    `--------------------------%0A` +
                    `*Bhai, payment details bhej do!*`;
        
        window.open(`https://wa.me/${phone}?text=${msg}`);
    }

    // Initial Load
    updateServices();
</script>

</body>
</html>
