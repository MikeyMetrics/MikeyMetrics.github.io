<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikey Metrics | Coming Soon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Outfit:wght@100;400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #00ffcc; /* Neon Cyan Color */
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        /* MATRIX DATA RAIN BACKGROUND */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.3;
        }

        /* 3D HOLOGRAPHIC CONTAINER */
        .container {
            text-align: center;
            padding: 40px;
            border: 2px solid rgba(0, 255, 204, 0.2);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            transform: rotateX(10deg);
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.2), inset 0 0 20px rgba(0, 255, 204, 0.1);
            max-width: 90%;
        }

        /* GLITCH TITLE */
        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 2px 2px #ff0055, -2px -2px #00ffcc;
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        .status {
            font-family: 'Outfit', sans-serif;
            font-weight: 100;
            letter-spacing: 5px;
            margin-bottom: 30px;
            opacity: 0.8;
            color: #00ffcc;
        }

        /* COUNTDOWN TIMER */
        .timer {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }

        .box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            min-width: 80px;
            border: 1px solid rgba(0, 255, 204, 0.3);
        }

        .box span {
            display: block;
            font-size: 1.5rem;
            font-weight: 900;
        }

        .box label {
            font-size: 0.6rem;
            text-transform: uppercase;
            opacity: 0.5;
        }

        /* LOADING BAR */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            margin-top: 40px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            width: 65%; /* Change this to update progress */
            height: 100%;
            background: #00ffcc;
            box-shadow: 0 0 15px #00ffcc;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.4;
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="container">
        <div class="status">SYSTEM INITIALIZING</div>
        <h1>MIKEY METRICS</h1>
        <p class="status" style="font-size: 0.7rem;">DEPLOYMENT IN PROGRESS</p>

        <div class="timer">
            <div class="box">
                <span id="days">00</span>
                <label>Days</label>
            </div>
            <div class="box">
                <span id="hours">00</span>
                <label>Hours</label>
            </div>
            <div class="box">
                <span id="mins">00</span>
                <label>Mins</label>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <footer>© 2026 Mikey Metrics Terminal v1.0.4</footer>
    </div>

    <script>
        // MATRIX BACKGROUND EFFECT
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = "0123456789ABCDEFHIJKLMNOPQRSTUVWXYZ@#$%&";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#00ffcc";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 50);

        // SIMPLE TIMER LOGIC (Change date here)
        const targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + 10); // 10 days from now

        function updateTimer() {
            const now = new Date();
            const diff = targetDate - now;

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

            document.getElementById('days').innerText = d < 10 ? '0' + d : d;
            document.getElementById('hours').innerText = h < 10 ? '0' + h : h;
            document.getElementById('mins').innerText = m < 10 ? '0' + m : m;
        }

        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
