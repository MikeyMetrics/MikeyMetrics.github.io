<script>
        const services = {
            insta: [
                {n: "Instagram Followers (Non-Drop)", p: 45},
                {n: "Instagram Reel Views (Instant)", p: 10},
                {n: "Instagram Likes (Real)", p: 15}
            ],
            yt: [{n: "YouTube Views", p: 130}, {n: "YouTube Subscribers", p: 195}],
            fb: [{n: "Facebook Page Likes", p: 50}],
            game: [{n: "BGMI 60 UC Pack", p: 75}, {n: "FF 100 Diamonds", p: 80}]
        };

        let selectedPrice = 0;
        let selectedSrvName = "";

        function updateServices() {
            const platform = document.getElementById('platform').value;
            const srvDropdown = document.getElementById('service');
            srvDropdown.innerHTML = '<option value="">-- Choose Function --</option>';
            if(platform) {
                services[platform].forEach(s => {
                    srvDropdown.innerHTML += `<option value="${s.p}">${s.n}</option>`;
                });
            }
            calcBill();
        }

        function calcBill() {
            const dropdown = document.getElementById('service');
            selectedPrice = parseFloat(dropdown.value) || 0;
            const selectedOption = dropdown.options[dropdown.selectedIndex];
            selectedSrvName = selectedOption ? selectedOption.text : "";
            
            const qty = parseFloat(document.getElementById('qty').value) || 0;
            const platform = document.getElementById('platform').value;
            let total = 0;

            if(platform === 'game') {
                total = selectedPrice * qty; 
            } else {
                total = (selectedPrice / 1000) * qty; 
            }
            document.getElementById('displayTotal').innerText = total.toFixed(2);
        }

        function processOrder() {
            const link = document.getElementById('target').value;
            const qty = document.getElementById('qty').value;
            const total = document.getElementById('displayTotal').innerText;
            
            // YOUR MANUAL NUMBER SET HERE
            const phone = "919341344821"; 

            if(!link || qty < 100 || !selectedSrvName || selectedSrvName.includes('--')) { 
                alert("Bhai, sari details bharo (Link, Qty aur Service)!"); 
                return; 
            }

            // WhatsApp Message Format
            const message = `*NEW ORDER - MIKEY METRICS*%0A` +
                            `--------------------------%0A` +
                            `🚀 *Service:* ${selectedSrvName}%0A` +
                            `🔗 *Target:* ${link}%0A` +
                            `🔢 *Quantity:* ${qty}%0A` +
                            `💰 *Total Bill:* ₹${total}%0A` +
                            `--------------------------%0A` +
                            `*Bhai, Order process kar do aur Payment details bhej do!*`;

            window.open("https://wa.me/" + phone + "?text=" + message, '_blank');
        }
               </script>
