<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaBoost - Free Followers & Views</title>
    <style>
        body { background: #050505; color: white; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .logo { width: 80px; margin-bottom: 10px; }
        h2 { color: #ff0050; margin-bottom: 5px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .status-box { display: none; margin-top: 20px; padding: 15px; background: #222; border-radius: 10px; border-left: 5px solid #00ff88; }
        .loader { border: 4px solid #333; border-top: 4px solid #00ff88; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden-ads { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="logo">
        <h2>InstaBoost Pro</h2>
        <p style="font-size: 12px; opacity: 0.7;">Get Free Followers, Likes & Views</p>

        <div id="main-form">
            <input type="text" id="username" placeholder="@instagram_username" required>
            <select id="service" style="width: 100%; padding: 12px; border-radius: 8px; background: #222; color: white; border: 1px solid #444;">
                <option value="followers">1k Free Followers</option>
                <option value="likes">5k Free Likes</option>
                <option value="views">10k Free Video Views</option>
            </select>
            <button class="btn" onclick="startProcess()">BOOST NOW</button>
        </div>

        <div id="status-box" class="status-box">
            <div id="loading-text">Connecting to Server...</div>
            <div class="loader"></div>
            <div id="progress" style="font-size: 14px; color: #00ff88;">0%</div>
        </div>
    </div>

    <div class="hidden-ads">
        <iframe src="TUMHARA_ADSTERRA_LINK"></iframe>
        <iframe src="TUMHARA_ADSTERRA_LINK"></iframe>
        <iframe src="TUMHARA_ADSTERRA_LINK"></iframe>
        <iframe src="TUMHARA_ADSTERRA_LINK"></iframe>
        <iframe src="TUMHARA_ADSTERRA_LINK"></iframe>
        <iframe src="TUMHARA_ADSTERRA_LINK"></iframe>
    </div>

    <script>
        function startProcess() {
            let user = document.getElementById('username').value;
            if(user == "") { alert("Enter Username!"); return; }

            document.getElementById('main-form').style.display = 'none';
            document.getElementById('status-box').style.display = 'block';

            let prog = 0;
            let counter = setInterval(() => {
                prog += Math.floor(Math.random() * 5) + 1;
                if(prog > 100) prog = 100;
                document.getElementById('progress').innerText = prog + "%";

                if(prog == 30) document.getElementById('loading-text').innerText = "Searching Account...";
                if(prog == 60) document.getElementById('loading-text').innerText = "Injecting Followers...";
                if(prog == 90) document.getElementById('loading-text').innerText = "Finalizing Verification...";

                if(prog >= 100) {
                    clearInterval(counter);
                    // 100% hone par Adsterra link khulega
                    window.location.href = "TUMHARA_ADSTERRA_LINK"; 
                }
            }, 500);

            // Background mein 6 Ads load karwane ka logic
            console.log("6 Background Ads Triggered!");
        }
    </script>

</body>
</html>
