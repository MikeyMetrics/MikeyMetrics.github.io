<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikey Metrics | Coming Soon</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --primary: #007aff;
            --accent: #5856d6;
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            perspective: 1000px; /* Essential for 3D depth */
        }

        /* 3D Typography Effect */
        .logo-3d {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
            color: var(--text);
            position: relative;
            display: inline-block;
            transform: rotateX(10deg) rotateY(-10deg);
            text-shadow: 
                1px 1px 0px #333,
                2px 2px 0px #333,
                3px 3px 0px #222,
                4px 4px 0px #222,
                5px 5px 15px rgba(0,0,0,0.5);
            animation: float 4s ease-in-out infinite alternate;
        }

        @keyframes float {
            from { transform: rotateX(10deg) rotateY(-15deg) translateY(0); }
            to { transform: rotateX(15deg) rotateY(15deg) translateY(-20px); }
        }

        .sub-text {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 20px;
        }

        /* Glassmorphism Badge */
        .badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            backdrop-filter: blur(10px);
            font-size: 0.8rem;
            margin-bottom: 2rem;
        }

            position: absolute;
            width: 400px;
